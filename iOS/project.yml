name: Sitterledger
options:
  bundleIdPrefix: com.shimondeitel.sitterledger
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Sitterledger:
    type: application
    platform: iOS
    sources:
      - path: Sitterledger
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.sitterledger
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Sitterledger/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  SitterledgerTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SitterledgerTests
      - path: Sitterledger.storekit
    dependencies:
      - target: Sitterledger
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.sitterledger.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  SitterledgerUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: SitterledgerUITests
    dependencies:
      - target: Sitterledger
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.sitterledger.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Sitterledger:
    build:
      targets:
        Sitterledger: all
        SitterledgerTests: [test]
        SitterledgerUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Sitterledger.storekit
    test:
      config: Debug
      storeKitConfiguration: Sitterledger.storekit
      targets:
        - SitterledgerTests
        - SitterledgerUITests
    archive:
      config: Release
